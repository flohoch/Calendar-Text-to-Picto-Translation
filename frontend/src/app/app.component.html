<div class="app">
  <header class="app-header">
    <h1>📅 Pictogram Translator</h1>
    <p class="subtitle">
      Translate calendar events into ARASAAC pictograms — multilingual hybrid pipeline
    </p>
  </header>

  <nav class="tabs">
    <button [class.active]="tab === 'translate'" (click)="setTab('translate')">
      Translate
    </button>
    <button [class.active]="tab === 'evaluation'" (click)="setTab('evaluation')">
      Evaluation
    </button>
  </nav>

  <main class="app-main" *ngIf="tab === 'translate'">
    <section class="input-section">
      <app-language-selector
        [value]="language"
        (valueChange)="language = $event"
      ></app-language-selector>

      <app-event-field-input
        label="Summary"
        placeholder="e.g. Essen Frühstück"
        icon="📝"
        [(value)]="summary"
      ></app-event-field-input>

      <app-event-field-input
        label="Location"
        placeholder="e.g. Schule"
        icon="📍"
        [(value)]="location"
      ></app-event-field-input>

      <app-event-field-input
        label="Attendees"
        placeholder="e.g. Mami, Papa, Dr. Müller"
        hint="Separate multiple attendees with commas"
        icon="👥"
        [(value)]="attendees"
      ></app-event-field-input>

      <button
        class="translate-btn"
        (click)="onTranslate()"
        [disabled]="loading || isAllEmpty()"
      >
        {{ loading ? 'Translating…' : 'Translate to Pictograms' }}
      </button>

      <div class="error-msg" *ngIf="error">Error: {{ error }}</div>
    </section>

    <section class="results-section" *ngIf="results">
      <h2>Translation Results</h2>
      <app-pictogram-results
        label="Summary"
        [data]="results.summary"
      ></app-pictogram-results>
      <app-pictogram-results
        label="Location"
        [data]="results.location"
      ></app-pictogram-results>
      <app-pictogram-results
        label="Attendees"
        [attendees]="results.attendees"
      ></app-pictogram-results>
    </section>
  </main>

  <main class="app-main" *ngIf="tab === 'evaluation'">
    <app-evaluation-view></app-evaluation-view>
  </main>

  <footer class="app-footer">
    Pictograms by
    <a href="https://arasaac.org" target="_blank" rel="noreferrer">ARASAAC</a>
    — CC BY-NC-SA 4.0
  </footer>
</div>
